{{- if not .Values.auth.existingSecret }}
{{- if not .Values.auth.adminToken }}
  {{- fail "auth.adminToken is required when auth.existingSecret is not set" }}
{{- end }}
{{- if not .Values.auth.tokenSeed }}
  {{- fail "auth.tokenSeed is required when auth.existingSecret is not set" }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ito-backend.fullname" . }}-auth
  labels:
    {{- include "ito-backend.labels" . | nindent 4 }}
type: Opaque
data:
  admin-token: {{ .Values.auth.adminToken | b64enc | quote }}
  token-seed: {{ .Values.auth.tokenSeed | b64enc | quote }}
{{- end }}
