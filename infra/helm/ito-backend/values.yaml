# Default values for ito-backend.

# Note: SQLite persistence requires exactly 1 replica.
# Scaling beyond 1 is not supported with the default storage backend.
replicaCount: 1

image:
  repository: ghcr.io/withakay/ito-backend
  pullPolicy: IfNotPresent
  # Overrides the image tag; defaults to the chart appVersion.
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# -- Authentication tokens for the backend API.
auth:
  # -- Admin token for privileged API operations.
  adminToken: ""
  # -- HMAC seed for generating per-repo tokens.
  tokenSeed: ""
  # -- Use an existing Kubernetes Secret instead of creating one.
  # When set, adminToken and tokenSeed are ignored.
  existingSecret: ""

# -- Persistent storage for SQLite state.
persistence:
  enabled: true
  # -- Storage class (empty = cluster default).
  storageClass: ""
  # -- Volume size.
  size: 1Gi
  # -- Access mode.
  accessMode: ReadWriteOnce

service:
  type: ClusterIP
  port: 9010

ingress:
  enabled: false
  className: ""
  annotations: {}
  host: ""
  tls: []
  #  - secretName: ito-backend-tls
  #    hosts:
  #      - ito.example.com

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

# -- Additional environment variables to set on the container.
extraEnv: []
#  - name: RUST_LOG
#    value: info

nodeSelector: {}
tolerations: []
affinity: {}

# -- Pod-level security context.
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65534
  runAsGroup: 65534
  fsGroup: 65534

# -- Container-level security context.
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL
