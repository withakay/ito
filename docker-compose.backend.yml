# Docker Compose definition for local Ito backend API testing.
#
# Quick start:
#   docker compose -f docker-compose.backend.yml up --build -d
#   curl http://127.0.0.1:9010/api/v1/health
#   docker compose -f docker-compose.backend.yml down
#
# Configuration:
#   Copy `.env.backend.example` to `.env.backend` and adjust values, or
#   export the variables in your shell before running compose.

services:
  ito-backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "${ITO_BACKEND_PORT:-9010}:9010"
    environment:
      - ITO_BACKEND_ADMIN_TOKEN=${ITO_BACKEND_ADMIN_TOKEN:-dev-admin-token}
      - ITO_BACKEND_TOKEN_SEED=${ITO_BACKEND_TOKEN_SEED:-dev-token-seed}
      - ITO_BACKEND_DATA_DIR=/data
    volumes:
      - ito-backend-data:/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:9010/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

volumes:
  ito-backend-data:
